name: Multiplatform Build and Release

on:
  push:
    tags:
      - '*' # any tag
  workflow_dispatch:

jobs:

  #
  # Linux build job
  #
  build-linux:

    runs-on: ubuntu-latest
    if: false
    outputs:
      artifact-name: linux-artifact

    steps:

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings-linux
        shell: bash
        run: |
          echo "build-name=${{ (github.ref_name == 'master' || github.ref_name == 'develop') && 'snapshot' || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "build-version=${{ (github.ref_name == 'master' || github.ref_name == 'develop') && '0.0.0' || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "cpu-count=4" >> "$GITHUB_OUTPUT"

#      - name: 'Cache dependencies'
#        id: cache-dependencies
#        uses: actions/cache@v4
#        with:
#          key: ${{ runner.os }}-apt-cache
#          path: |
#            /var/cache/apt/archives

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y devscripts build-essential debhelper-compat cmake qt6-base-dev libusb-1.0-0-dev zlib1g-dev libgl1-mesa-dev
          for pkg in libairspy-dev libhydrasdr-dev librtlsdr-dev; do
            sudo apt install -y $pkg || true
          done

      - name: Build project
        run: |
          export DEBEMAIL="josevcm@gmail.com"
          export DEBFULLNAME="Jose Vicente Campos"
          dch --create --package nfc-lab --newversion "${{ steps.strings-linux.outputs.build-version }}" "Automated build"
          dch --release --distribution unstable ""
          dpkg-buildpackage -us -uc -j${{ steps.strings-linux.outputs.cpu-count }}
          mv ../*.deb .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: ${{ github.workspace }}/*.deb

  build-macos:
    runs-on: macos-latest
    if: false
    steps:

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings-macos
        shell: bash
        run: |
          echo "build-name=${{ (github.ref_name == 'master' || github.ref_name == 'develop') && 'snapshot' || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "build-version=${{ (github.ref_name == 'master' || github.ref_name == 'develop') && '0.0.0' || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "cpu-count=4" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          brew install mesa libusb qt qtsvg cmake gcc

      - name: Build project
        run: |
          mkdir build
          cd build
          cmake .. `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DBUILD_PROJECT_VERSION="${{ steps.strings-macos.outputs.build-version }}"
          
          make -j ${{ steps.strings-macos.outputs.cpu-count }}

  #
  # Windows build job
  #
  build-windows:

    runs-on: windows-latest
    outputs:
      artifact-name: windows-artifact

    steps:

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings-windows
        shell: bash
        run: |
          echo "build-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          echo "build-name=${{ (github.ref_name == 'master' || github.ref_name == 'develop') && 'snapshot' || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "build-version=${{ (github.ref_name == 'master' || github.ref_name == 'develop') && '0.0.0' || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "installer-data-dir=${{ github.workspace }}/build/installer/data" >> "$GITHUB_OUTPUT"
          echo "installer-meta-dir=${{ github.workspace }}/build/installer/meta" >> "$GITHUB_OUTPUT"

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6
            mingw-w64-ucrt-x86_64-grpc
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-nsis
            mingw-w64-ucrt-x86_64-pkgconf

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            msys2-${{ runner.os }}-

      - name: Build project
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/ucrt64 \
            -DBUILD_PROJECT_VERSION="${{ steps.strings-windows.outputs.build-version }}"

          cmake --build build --parallel

      - name: Prepare installer
        shell: powershell
        run: |
          New-Item -Force -ItemType directory -Path ${{ steps.strings-windows.outputs.installer-data-dir }}
          New-Item -Force -ItemType directory -Path ${{ steps.strings-windows.outputs.installer-meta-dir }}

      - name: Copy executables
        shell: powershell
        run: |
          Copy-Item -Force ${{ steps.strings-windows.outputs.build-dir }}/src/nfc-app/app-qt/nfc-lab.exe ${{ steps.strings-windows.outputs.installer-data-dir }}
          Copy-Item -Force ${{ steps.strings-windows.outputs.build-dir }}/src/nfc-app/app-rx/nfc-rx.exe ${{ steps.strings-windows.outputs.installer-data-dir }}

      - name: Deploy Qt
        shell: msys2 {0}
        run: |
          INSTALLER_DATA=$(cygpath "${{ steps.strings-windows.outputs.installer-data-dir }}")
          /ucrt64/bin/windeployqt \
          --verbose 1 \
          --compiler-runtime \
          --no-translations \
          --no-system-d3d-compiler \
          --no-opengl-sw \
          "$INSTALLER_DATA/nfc-lab.exe"

      - name: Resolve runtime dependencies (ldd)
        shell: msys2 {0}
        run: |
          INSTALLER_DATA=$(cygpath "${{ steps.strings-windows.outputs.installer-data-dir }}")
          APP="$INSTALLER_DATA/nfc-lab.exe"

          echo "🔍 Detecting dependencies..."
          ldd "$APP" > deps.txt
          cat deps.txt

          echo "📦 Copying required DLLs..."
          while read line; do
            dll=$(echo "$line" | awk '{print $3}')
            if [[ -f "$dll" && "$dll" != "$INSTALLER_DATA"* && "$dll" != /c/Windows/* ]]; then
              cp -v "$dll" "$INSTALLER_DATA/"
            fi
          done < deps.txt

      - name: Copy external DLLs
        shell: powershell
        run: |
          Copy-Item -Force ${{ github.workspace }}/dll/airspy/x86_64/bin/*.dll ${{ steps.strings-windows.outputs.installer-data-dir }}
          Copy-Item -Force ${{ github.workspace }}/dll/hydrasdr/x86_64/bin/*.dll ${{ steps.strings-windows.outputs.installer-data-dir }}
          Copy-Item -Force ${{ github.workspace }}/dll/rtlsdr/x86_64/bin/*.dll ${{ steps.strings-windows.outputs.installer-data-dir }}

      - name: Copy resources
        shell: powershell
        run: |
          Copy-Item -Force -Recurse ${{ github.workspace }}/dat/config ${{ steps.strings-windows.outputs.installer-data-dir }}
          Copy-Item -Force -Recurse ${{ github.workspace }}/dat/drivers ${{ steps.strings-windows.outputs.installer-data-dir }}
          Copy-Item -Force -Recurse ${{ github.workspace }}/dat/firmware ${{ steps.strings-windows.outputs.installer-data-dir }}
          Copy-Item -Force -Recurse ${{ github.workspace }}/dat/resources ${{ steps.strings-windows.outputs.installer-meta-dir }}

      - name: Create portable package
        shell: powershell
        run: |
          Compress-Archive `
            -Path ${{ steps.strings-windows.outputs.installer-data-dir }}/* `
            -DestinationPath ${{ github.workspace }}/nfc-lab-${{ steps.strings-windows.outputs.build-version }}-x86_64-portable.zip

      - name: Create NSIS installer
        shell: msys2 {0}
        run: |
          INSTALLER_META=$(cygpath "${{ steps.strings-windows.outputs.installer-meta-dir }}")
          /ucrt64/bin/makensis.exe "$INSTALLER_META/script.nsi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: |
            ${{ github.workspace }}/*.exe
            ${{ github.workspace }}/*.zip

  #
  # Create release job
  #
  create-release:

    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - build-linux
      - build-windows

    steps:

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: ./release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: ./release

      - name: Create release (Tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        id: create-release-tag
        with:
          draft: false
          prerelease: false
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ./release/*
          body: |
            This is the release build for version ${{ github.ref_name }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release (Snapshot)
        if: github.ref_name == 'master' || github.ref_name == 'develop'
        uses: softprops/action-gh-release@v2
        id: create-release-snapshot
        with:
          draft: false
          prerelease: true
          name: Snapshot Build
          tag_name: snapshot-build
          files: ./release/*
          body: |
            This is the latest snapshot build for ${{ github.ref }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  #
  # WinGet release job
  #
  winget-release:
    runs-on: windows-latest
    needs: create-release
#    if: github.ref_type == 'tag'
    if: false
    steps:
      - name: WinGet Releaser
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: josevcm.nfc-lab
          installers-regex: 'nfc-lab-.*-x86_64-portable\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
          fork-user: josevcm